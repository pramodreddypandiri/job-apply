services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
    env_file: .env
    environment:
      - PYTHONPATH=/app
    network_mode: host
    depends_on:
      - redis

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A backend.tasks.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/app/backend
    env_file: .env
    environment:
      - PYTHONPATH=/app
    network_mode: host
    depends_on:
      - redis

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A backend.tasks.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app/backend
    env_file: .env
    environment:
      - PYTHONPATH=/app
    depends_on:
      - redis

volumes:
  redis_data:
